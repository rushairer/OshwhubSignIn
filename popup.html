<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    .status {
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 5px;
      text-align: center;
      font-weight: bold;
    }
    .signed {
      background-color: #e8f5e9;
      color: #2e7d32;
    }
    .unsigned {
      background-color: #ffebee;
      color: #c62828;
    }
    .not-logged-in {
      background-color: #fff3e0;
      color: #ef6c00;
    }
    .sign-button {
      display: block;
      width: 100%;
      padding: 10px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
      text-align: center;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
    .sign-button:hover {
      background-color: #1565c0;
    }
    .sign-button:disabled {
      background-color: #bbdefb;
      cursor: not-allowed;
    }
    .meta {
      margin: 12px 0;
      padding: 10px;
      border-radius: 6px;
      background: #f7f9fc;
      border: 1px solid #e4e8ef;
      font-size: 12px;
      color: #334;
    }
    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    .meta-row:last-child {
      margin-bottom: 0;
    }
    .meta-label {
      color: #667085;
    }
    .meta-value {
      text-align: right;
      font-weight: 600;
      word-break: break-all;
    }
    .logs {
      margin: 12px 0;
      padding: 10px;
      border-radius: 6px;
      background: #fbfbfd;
      border: 1px solid #e4e8ef;
    }
    .logs-title {
      font-size: 12px;
      font-weight: 700;
      color: #334;
      margin-bottom: 8px;
    }
    .logs-content {
      font-size: 12px;
      color: #556;
      line-height: 1.5;
      max-height: 120px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .hint {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="status" class="status">检查中...</div>
  <button id="signButton" class="sign-button" style="display: none">立即签到</button>
  <a href="https://oshwhub.com/sign_in" id="openPageButton" class="sign-button" target="_blank" style="display: none; background-color: #455a64;">打开签到页</a>

  <div id="metaPanel" class="meta" style="display: none;">
    <div class="meta-row"><span class="meta-label">当前积分</span><span id="totalPoint" class="meta-value">-</span></div>
    <div class="meta-row"><span class="meta-label">本月签到</span><span id="monthDays" class="meta-value">-</span></div>
    <div class="meta-row"><span class="meta-label">最新签到</span><span id="latestSignIn" class="meta-value">-</span></div>
    <div class="meta-row"><span class="meta-label">成功方式</span><span id="strategy" class="meta-value">-</span></div>
  </div>

  <div id="logsPanel" class="logs" style="display: none;">
    <div class="logs-title">本次执行记录</div>
    <div id="logsContent" class="logs-content">-</div>
  </div>

  <div class="hint">插件会自动检查签到状态；未签到时也支持在弹窗里直接执行签到。</div>
  <script src="popup.js"></script>
</body>
</html>
