<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    .status {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 5px;
      text-align: center;
      font-weight: bold;
    }
    .signed {
      background-color: #e8f5e9;
      color: #2e7d32;
    }
    .unsigned {
      background-color: #ffebee;
      color: #c62828;
    }
    .not-logged-in {
      background-color: #fff3e0;
      color: #ef6c00;
    }
    .sign-button {
      display: block;
      width: 100%;
      padding: 10px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
      text-align: center;
      margin-bottom: 10px;
    }
    .sign-button:hover {
      background-color: #1565c0;
    }
    .sign-button:disabled {
      background-color: #bbdefb;
      cursor: not-allowed;
    }
    .hint {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="status" class="status">检查中...</div>
  <button id="signButton" class="sign-button" style="display: none">立即签到</button>
  <a href="https://oshwhub.com/sign_in" id="openPageButton" class="sign-button" target="_blank" style="display: none; background-color: #455a64;">打开签到页</a>
  <div class="hint">插件会自动检查签到状态；未签到时也支持在弹窗里直接执行签到。</div>
  <script src="popup.js"></script>
</body>
</html>
